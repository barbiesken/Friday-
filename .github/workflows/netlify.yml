name: Deploy to Netlify

# Builds the renderer and publishes apps/desktop/dist to Netlify via its API.
# Runs on GitHub's runners (open internet), so the repo can stay private.
# Requires one repo secret: NETLIFY_AUTH_TOKEN
#   (Netlify → User settings → Applications → New access token).
# Manual trigger only — run it from the Actions tab or via the API.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy to Netlify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Publish dist to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Create a fresh Netlify site (auto-named to avoid global name clashes).
          SITE=$(curl -sS -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -X POST https://api.netlify.com/api/v1/sites \
            -H 'Content-Type: application/json' -d '{}')
          SITE_ID=$(echo "$SITE" | jq -r '.id // empty')
          URL=$(echo "$SITE" | jq -r '.ssl_url // .url // empty')
          if [ -z "$SITE_ID" ]; then echo "::error::Netlify site create failed"; echo "$SITE"; exit 1; fi
          # Zip the build and deploy it.
          ( cd dist && zip -qr /tmp/site.zip . )
          curl -sS -o /tmp/deploy.json -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/zip" --data-binary @/tmp/site.zip \
            -X POST "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys"
          echo "::notice title=FRIDAY is live::$URL"
          echo "## 🚀 FRIDAY is live" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
