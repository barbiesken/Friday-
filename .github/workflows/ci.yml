name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  desktop:
    name: Renderer — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  core:
    name: Core service — compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m compileall friday
